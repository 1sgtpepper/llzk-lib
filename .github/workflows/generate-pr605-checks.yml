name: Generate PR 605 PCL checks

on:
  push:
    branches: [ci/pr605-check-generation]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      # v37.1.0
      - uses: cachix/install-nix-action@d1ca217b388ee87b2507a9a93bf01368bde7cec2
        with:
          install_url: https://releases.nixos.org/nix/nix-2.23.3/install
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Set Git credentials
        run: |
          git config --global 'url.https://api@github.com/'.insteadOf 'https://github.com/'
          git config --global 'url.https://ssh@github.com/'.insteadOf 'ssh://git@github.com/'
          git config --global 'url.https://git@github.com/'.insteadOf 'git@github.com:'
      - uses: cachix/cachix-action@v17
        with:
          name: veridise-public
      - name: Build llzk-opt
        run: nix --print-build-logs build '.#debugGCC'
      - name: Generate checks
        run: |
          test_file=test/Transforms/PCLLowering/pcl_lowering_pass.llzk
          result/bin/llzk-opt \
            -I test/Transforms/PCLLowering \
            -split-input-file \
            -llzk-to-pcl \
            -verify-diagnostics \
            "$test_file" > /tmp/pcl-output.llzk
          scripts/generate-test-checks.py \
            /tmp/pcl-output.llzk \
            --source "$test_file" \
            --source_delim_regex='^// -----$' \
            -o /tmp/pcl-generated-with-banner.llzk
          sed \
            -e '1,/^$/d' \
            -e 's#// CHECK-NEXT:#// CHECK-DAG:#' \
            /tmp/pcl-generated-with-banner.llzk \
            > /tmp/pcl-lowering-pass-generated.llzk
          test "$(grep -c '^// CHECK-LABEL:' /tmp/pcl-lowering-pass-generated.llzk)" -eq 10
          test "$(grep -c '^// -----$' /tmp/pcl-lowering-pass-generated.llzk)" -eq 9
          ! grep -q '^// NOTE: Assertions have been autogenerated' \
            /tmp/pcl-lowering-pass-generated.llzk
      - name: Upload generated checks
        uses: actions/upload-artifact@v7
        with:
          name: pr605-pcl-generated-checks
          path: |
            /tmp/pcl-output.llzk
            /tmp/pcl-generated-with-banner.llzk
            /tmp/pcl-lowering-pass-generated.llzk

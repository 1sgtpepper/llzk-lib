name: Generate Test Checks
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@d1ca217b388ee87b2507a9a93bf01368bde7cec2
        with:
          install_url: https://releases.nixos.org/nix/nix-2.23.3/install
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Set Git credentials
        run: |
          git config --global 'url.https://api@github.com/'.insteadOf 'https://github.com/'
          git config --global 'url.https://ssh@github.com/'.insteadOf 'ssh://git@github.com/'
          git config --global 'url.https://git@github.com/'.insteadOf 'git@github.com:'
      - uses: cachix/cachix-action@v17
        with:
          name: veridise-public
          authToken: '${{ secrets.CACHIX_PUBLIC_TOKEN }}'
      - name: Build llzk-opt
        run: nix --print-build-logs build '.#debugClangCov'
      - name: Debug: count segments
        run: |
          echo "=== Source segments ==="
          grep -c "^// -----" test/Transforms/PolyLowering/poly_lowering_containment.llzk || true
          echo "=== Running llzk-opt ==="
          result/bin/llzk-opt -I test/Transforms/PolyLowering -split-input-file \
            -llzk-poly-lowering-pass="max-degree=2" \
            test/Transforms/PolyLowering/poly_lowering_containment.llzk > /tmp/llzk-opt-output.txt 2>&1 || true
          echo "=== Output segments ==="
          grep -c "^// -----" /tmp/llzk-opt-output.txt || true
          echo "=== First 50 lines of output ==="
          head -50 /tmp/llzk-opt-output.txt
          echo "=== Output line count ==="
          wc -l /tmp/llzk-opt-output.txt
